name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Least-privilege default; jobs that need more permissions declare it explicitly.
permissions:
  contents: read

jobs:
  build:
    name: Build and lint (Node ${{ matrix.node }} on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: ['18.x', '20.x']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit (production deps)
        run: npm audit --audit-level=high --omit=dev

      - name: Type-check
        run: npm run typecheck

      - name: Lint (zero warnings)
        run: npm run lint:ci

      - name: Build (production bundle)
        run: npm run package

  mcp-server:
    name: MCP server (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '20.x'
          cache: npm

      # hashFiles() always evaluates to '' in a job-level `if` (no workspace
      # before checkout), so the guard is applied per step: the job stays green
      # until mcp-server/ lands, then builds automatically.
      - name: Install root dependencies (mcp-server tsconfig reaches into ../src)
        if: hashFiles('mcp-server/package.json') != ''
        run: npm ci

      - name: Install mcp-server dependencies
        if: hashFiles('mcp-server/package.json') != ''
        run: npm ci
        working-directory: mcp-server

      - name: Build mcp-server
        if: hashFiles('mcp-server/package.json') != ''
        run: npm run build
        working-directory: mcp-server

  license-server:
    name: License server (build and test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '20.x'
          cache: npm

      # Same step-level guard as the mcp-server job: hashFiles() is empty in a
      # job-level `if`, so each step is skipped until license-server/ lands.
      - name: Install license-server dependencies
        if: hashFiles('license-server/package.json') != ''
        run: npm ci
        working-directory: license-server

      - name: Build license-server
        if: hashFiles('license-server/package.json') != ''
        run: npm run build
        working-directory: license-server

      - name: Test license-server
        if: hashFiles('license-server/package.json') != ''
        run: npm test
        working-directory: license-server

  test:
    name: Integration tests (${{ matrix.os }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension bundle (required by VS Code test host)
        run: npm run compile

      - name: Compile tests
        run: npm run compile-tests

      # VS Code Electron host requires a display server on Linux.
      - name: Run tests (Linux, headless)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test

      - name: Run tests (Windows)
        if: runner.os != 'Linux'
        run: npm test
