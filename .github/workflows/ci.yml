name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Least-privilege default; jobs that need more permissions declare it explicitly.
permissions:
  contents: read

jobs:
  build:
    name: Build and lint (Node ${{ matrix.node }} on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: ['18.x', '20.x']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit (production deps)
        run: npm audit --audit-level=high --omit=dev

      - name: Type-check
        run: npm run typecheck

      - name: Lint (zero warnings)
        run: npm run lint:ci

      - name: Build (production bundle)
        run: npm run package

  test:
    name: Integration tests (${{ matrix.os }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile tests
        run: npm run compile-tests

      # VS Code Electron host requires a display server on Linux.
      - name: Run tests (Linux, headless)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test

      - name: Run tests (Windows)
        if: runner.os != 'Linux'
        run: npm test
