name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Least-privilege default; jobs that need more permissions declare it explicitly.
permissions:
  contents: read

jobs:
  build:
    name: Build and lint (Node ${{ matrix.node }} on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: ['18.x', '20.x']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit (production deps)
        run: npm audit --audit-level=high --omit=dev

      - name: Type-check
        run: npm run typecheck

      - name: Lint (zero warnings)
        run: npm run lint:ci

      - name: Build (production bundle)
        run: npm run package

  test:
    name: Integration tests (${{ matrix.os }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile tests
        run: npm run compile-tests

      # VS Code Electron host requires a display server on Linux.
      - name: Run tests (Linux, headless)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test

      - name: Run tests (Windows)
        if: runner.os != 'Linux'
        run: npm test
