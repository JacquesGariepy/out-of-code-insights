name: Publish MCP server

on:
  push:
    tags:
      - 'mcp-v*'

# Least-privilege default; publishing only needs to read the repository.
permissions:
  contents: read

jobs:
  publish:
    name: Build and publish mcp-server to npm
    runs-on: ubuntu-latest
    env:
      # Exposed as env so steps can be conditioned on its presence
      # (the secrets context is not usable in step-level `if`).
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20.x'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install root dependencies (mcp-server tsconfig reaches into ../src)
        run: npm ci

      - name: Install mcp-server dependencies
        run: npm ci
        working-directory: mcp-server

      - name: Build mcp-server
        run: npm run build
        working-directory: mcp-server

      # The published version is whatever mcp-server/package.json declares;
      # fail fast if the tag does not match it.
      - name: Verify tag matches mcp-server/package.json version
        run: |
          pkg_version="$(node -p "require('./mcp-server/package.json').version")"
          tag_version="${GITHUB_REF_NAME#mcp-v}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match mcp-server version $pkg_version"
            exit 1
          fi

      - name: Publish to npm
        if: env.NPM_TOKEN != ''
        run: npm publish --access public
        working-directory: mcp-server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Notice when NPM_TOKEN is absent
        if: env.NPM_TOKEN == ''
        run: echo "::notice::NPM_TOKEN secret is not configured; skipping npm publish."
