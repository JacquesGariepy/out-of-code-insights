name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Least-privilege default; the release job elevates to write.
permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build, publish, and create GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required for gh release create
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit (production deps)
        run: npm audit --audit-level=high --omit=dev

      - name: Type-check
        run: npm run typecheck

      - name: Lint (zero warnings)
        run: npm run lint:ci

      - name: Package VSIX
        run: npm run package:vsix

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --packagePath *.vsix --pat "$VSCE_PAT"

      - name: Publish to Open VSX Registry
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
        run: npx ovsx publish *.vsix --pat "$OVSX_TOKEN"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            *.vsix
